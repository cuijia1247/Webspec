    - { id: 8, label: side_navigation, zh: 侧边导航 }
    - { id: 9, label: dropdown_menu, zh: 下拉菜单 }
    - { id: 10, label: pagination, zh: 分页 }
    - { id: 11, label: breadcrumb, zh: 面包屑 }
