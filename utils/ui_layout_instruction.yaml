# UI 布局检测类别说明（供指令生成、标签解析与脚本对齐）
#
# 依据：
#   - level_1.categories：utils/five_dicts_predict.py 中 FiveDictsPredictConfig.layout_labels 顺序
#   - component.categories：pretrainedModels/yolo/models/ui_tag_data.yaml 中 names
#
# 注意：level-1 的 YOLO class_id 须与训练该权重时 data yaml 里 names 的键顺序一致。
#       若部署的 best.pt 中 names 顺序与下表不同，以推理时模型输出的 names 为准，并相应调整此表或重训。

meta:
  level_1_config: utils/five_dicts_predict.py
  component_config: pretrainedModels/yolo/models/ui_tag_data.yaml
  component_script: utils/components_predict.py

level_1:
  description: Level-1 五分区（整页粗粒度区域）
  num_classes: 5
  categories:
    - { id: 0, label: body }
    - { id: 1, label: footer }
    - { id: 2, label: header }
    - { id: 3, label: leftsider }
    - { id: 4, label: rightsider }

component:
  description: UI 组件/控件细粒度检测（与 ui_tag_data.yaml names 一致；label 为英文 slug，zh 为训练数据中文名）
  num_classes: 49
  categories:
    - { id: 0, label: button, zh: 按钮 }
    - { id: 1, label: floating_action_button, zh: 悬浮按钮 }
    - { id: 2, label: icon, zh: 图标 }
    - { id: 3, label: radio_block, zh: 单选块 }
    - { id: 4, label: scrollbar, zh: 滚动条 }
    - { id: 5, label: title_text, zh: 标题文本 }
